<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VOID — LinkBox</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="wrap">
  <canvas id="bg"></canvas>
  <div id="world">
    <div id="center-title">
      <span class="ct-top">my space</span>
      <span class="ct-main">VOID</span>
      <span class="ct-sub">SPACE</span>
    </div>
  </div>
</div>

<div id="add-bar">
  <div id="add-inner">
    <input id="url-input" type="url" placeholder="링크 붙여넣기 — 웹, YouTube, 인스타, X 모두 가능" autocomplete="off" spellcheck="false"/>
    <button id="add-btn" onclick="addLink()">추가</button>
  </div>
</div>
<div id="add-status"></div>

<div id="rec-bar">
  <div id="rec-inner">
    <div id="rec-head">
      <div id="rec-lbl"><div id="rec-dot"></div>지금 이런 아티클이 필요하지 않으세요?</div>
      <div id="rec-close" onclick="dismissRec()">닫기</div>
    </div>
    <div id="rec-list"></div>
  </div>
</div>

<div id="leg"></div>
<div id="hud">
  <div class="hb" id="bp">+</div>
  <div class="hb" id="bm">−</div>
  <div class="hb" id="bf" style="font-size:12px">⊞</div>
</div>
<div id="zlbl">55%</div>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<!-- App -->
<script src="config.js"></script>
<script src="db.js"></script>
<script src="bg.js"></script>
<script src="world.js"></script>
<script src="app.js"></script>

</body>
</html>
